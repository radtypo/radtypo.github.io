<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="a track by rad.typo">
    <title id="page-title">loading... - rad.typo</title>
    <meta property="og:title" content="rad.typo">
    <meta property="og:description" content="a track by rad.typo">
    <meta property="og:image" content="">
    <meta property="og:url" content="">
    <meta property="og:type" content="music.song">
    <meta property="og:site_name" content="rad.typo">
    <link rel="canonical" href="">
    <style>
        :root {
            --bg-color: #fff;
            --text-color: #000;
            --link-color: #0000FF;
            --secondary-color: #666;
        }

        body {
            font-family: monospace;
            max-width: 800px;
            margin: 48px auto;
            padding: 24px;
            line-height: 1.6;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        h1, h2 { margin: 0; padding: 0; }
        h1 { font-size: 24px; margin-bottom: 24px; }
        h2 { font-size: 16px; margin-bottom: 15px; font-weight: normal; }

        a { color: var(--link-color); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .header { margin-bottom: 30px; position: relative; }
        .back { position: absolute; top: 0; right: 0; font-size: 14px; }
        .site-title { color: inherit; text-decoration: none; }
        .site-title:hover { text-decoration: none; }

        .status { color: var(--secondary-color); font-size: 14px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

        .breathing-dots::after {
            content: '';
            animation: breathe 4s infinite;
        }
        @keyframes breathe {
            0%, 100% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }

        .kp-circle {
            width: 12px; height: 12px; border-radius: 50%;
            background: var(--kp-color, #2ecc71);
            transition: background 0.5s ease;
            display: inline-block;
        }

        .album-info { margin-bottom: 40px; }
        .album-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .album-header h2 { margin: 0; font-weight: bold; }
        .album-meta { color: var(--secondary-color); font-size: 14px; }

        .artwork-container { text-align: center; margin: 30px 0; }
        .song-artwork { max-width: 100%; max-height: 400px; cursor: pointer; }

        .player-container { margin: 30px 0; }
        audio { width: 100%; }

        .section { margin: 20px 0; border: 1px solid var(--secondary-color); border-radius: 4px; }
        .section-header {
            padding: 10px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid transparent;
        }
        .section-header:hover { background-color: var(--secondary-color); color: var(--bg-color); }
        .section-content { padding: 15px; display: none; }
        .section-content.open { display: block; border-top: 1px solid var(--secondary-color); }

        .lyrics { white-space: pre-line; line-height: 1.8; }

        .button-nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-button {
            background: none; border: 1px solid var(--secondary-color);
            color: var(--text-color); padding: 8px 12px; cursor: pointer;
            font-family: monospace; font-size: 14px;
        }
        .nav-button:hover { background-color: var(--secondary-color); color: var(--bg-color); }
        .nav-button.active { background-color: var(--text-color); color: var(--bg-color); }

        .details-content { min-height: 150px; }
        .metadata-grid { display: grid; grid-template-columns: auto 1fr; gap: 8px 16px; }
        .metadata-grid dt { color: var(--secondary-color); font-weight: normal; }
        .metadata-grid dd { margin: 0; }

        .equipment-list { margin-left: 20px; margin-bottom: 15px; }
        .equipment-category { font-weight: normal; margin: 15px 0 8px 0; color: var(--secondary-color); }

        .resource-link { display: block; margin: 5px 0; color: var(--link-color); }
        .resource-link:before { content: "• "; color: var(--text-color); }

        .footer {
            margin-top: 60px; padding-top: 20px;
            border-top: 1px solid var(--secondary-color);
            font-size: 14px; color: var(--secondary-color);
        }
        .footer a { color: var(--secondary-color); }

        .error-message { text-align: center; padding: 60px 20px; color: var(--secondary-color); }

        @media (max-width: 600px) {
            body { margin: 20px auto; padding: 15px; }
            .button-nav { gap: 6px; margin-bottom: 15px; }
            .nav-button { padding: 6px 8px; font-size: 12px; border-radius: 2px; }
            .metadata-grid { grid-template-columns: 1fr; gap: 4px; }
            .metadata-grid dt { margin-top: 12px; }
            .metadata-grid dt:first-child { margin-top: 0; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="/" class="back">← back</a>
        <h1><a href="/" class="site-title">rad.typo</a></h1>
        <div class="status">
            derry: <span id="weather-temp">-</span>°C <span id="weather-icon">⛅</span> |
            kp: <span class="kp-circle"></span><span id="kp-value">-</span> |
            cpu: <span id="cpu-temp">-</span>°C<span class="breathing-dots"></span>
        </div>
    </header>

    <div id="song-content"></div>

    <footer class="footer">
        └─ <a href="/infrastructure.html">infrastructure</a> | <a href="/telemetry.html">telemetry</a>
    </footer>

    <script src="/js/status.js"></script>
    <script>
        let currentSong = null;

        function getSongId() {
            let id = new URLSearchParams(window.location.search).get('id');
            if (!id) {
                const match = window.location.pathname.match(/\/songs\/([^/]+)\.html$/);
                if (match) id = match[1];
            }
            return id;
        }

        const songId = getSongId();

        async function loadSong() {
            if (!songId) { showError('No song specified'); return; }
            try {
                const response = await fetch('/data/songs.json');
                const songs = await response.json();
                currentSong = songs[songId];
                if (!currentSong) { showError(`Song "${songId}" not found`); return; }
                renderSong(currentSong);
            } catch (error) {
                console.error('Failed to load song:', error);
                showError('Failed to load song data');
            }
        }

        function showError(message) {
            document.getElementById('song-content').innerHTML = `
                <div class="error-message">
                    <p>${message}</p>
                    <p><a href="/">← back to home</a></p>
                </div>`;
        }

        function renderSong(song) {
            document.getElementById('page-title').textContent = `${song.title} - rad.typo`;
            document.querySelector('meta[property="og:title"]').setAttribute('content', song.title);
            document.querySelector('meta[property="og:image"]').setAttribute('content', `https://radtypo.com/images/${song.artwork}`);
            document.querySelector('meta[property="og:url"]').setAttribute('content', window.location.href);
            document.querySelector('meta[name="description"]').setAttribute('content', `${song.title} by rad.typo`);
            document.querySelector('link[rel="canonical"]').setAttribute('href', `https://radtypo.com/songs/${songId}.html`);
            let resourcesHtml = '';
            if (song.resources?.length > 0) {
                song.resources.forEach(r => {
                    resourcesHtml += `<a href="${r.url}" download class="resource-link">${r.name}</a>`;
                });
            }

            document.getElementById('song-content').innerHTML = `
                <div class="album-info">
                    <div class="album-header"><h2>${song.title}</h2></div>
                    <div class="album-meta">${song.date}</div>
                </div>
                <div class="artwork-container">
                    <img src="/images/${song.artwork}" alt="${song.title} artwork" class="song-artwork">
                </div>
                <div class="player-container">
                    <audio controls preload="metadata">
                        <source src="/audio/${song.audio}" type="audio/mpeg">
                    </audio>
                </div>
                <div class="section">
                    <div class="section-header" onclick="toggleSection('lyrics')">
                        <span>lyrics</span>
                        <span class="toggle" id="lyrics-toggle">[ - ]</span>
                    </div>
                    <div class="section-content open" id="lyrics">
                        <div class="lyrics">${song.lyrics || 'No lyrics available'}</div>
                    </div>
                </div>
                <div class="section">
                    <div class="section-header" onclick="toggleSection('details')">
                        <span>details</span>
                        <span class="toggle" id="details-toggle">[ + ]</span>
                    </div>
                    <div class="section-content" id="details">
                        <div class="button-nav">
                            <button class="nav-button active" onclick="showDetailsContent('track', this)">track</button>
                            <button class="nav-button" onclick="showDetailsContent('equipment', this)">equipment</button>
                            <button class="nav-button" onclick="showDetailsContent('technical', this)">technical</button>
                            <button class="nav-button" onclick="showDetailsContent('credits', this)">credits</button>
                        </div>
                        <div class="details-content" id="details-content">
                            ${renderTrackDetails(song.details?.track)}
                        </div>
                    </div>
                </div>
                <div class="section">
                    <div class="section-header" onclick="toggleSection('resources')">
                        <span>resources</span>
                        <span class="toggle" id="resources-toggle">[ + ]</span>
                    </div>
                    <div class="section-content" id="resources">
                        ${resourcesHtml || 'No resources available'}
                    </div>
                </div>`;
        }

        function renderTrackDetails(track) {
            if (!track) return '<p>No track details available</p>';
            let html = '<dl class="metadata-grid">';
            if (track.composition_date) html += `<dt>composition date</dt><dd>${track.composition_date}</dd>`;
            if (track.release_date) html += `<dt>release date</dt><dd>${track.release_date}</dd>`;
            if (track.key) html += `<dt>key</dt><dd>${track.key}</dd>`;
            if (track.bpm) html += `<dt>bpm</dt><dd>${track.bpm}</dd>`;
            if (track.time_signature) html += `<dt>time signature</dt><dd>${track.time_signature}</dd>`;
            if (track.tuning) html += `<dt>tuning</dt><dd>${track.tuning}</dd>`;
            if (track.isrc) html += `<dt>isrc</dt><dd>${track.isrc}</dd>`;
            return html + '</dl>';
        }

        function renderEquipmentDetails(equipment) {
            if (!equipment) return '<p>No equipment details available</p>';
            let html = '';
            const categories = [
                ['guitars', 'guitars:'],
                ['guitar_amplifiers', 'guitar amplifiers:'],
                ['bass', 'bass:'],
                ['keys', 'keys:'],
                ['drums', 'drums:'],
                ['vocal', 'vocal:']
            ];
            categories.forEach(([key, label]) => {
                if (equipment[key]?.length > 0) {
                    html += `<div class="equipment-category">${label}</div>`;
                    html += `<div class="equipment-list">${equipment[key].join('<br>')}</div>`;
                }
            });
            return html || '<p>No equipment details available</p>';
        }

        function renderTechnicalDetails(technical) {
            if (!technical) return '<p>No technical details available</p>';
            let html = '';
            if (technical.drum_channels?.length > 0) {
                html += '<div class="equipment-category">drum channels:</div>';
                html += `<div class="equipment-list">${technical.drum_channels.join('<br>')}</div>`;
            }
            if (technical.recording_chain) {
                html += '<div class="equipment-category">recording chain:</div>';
                html += `<div class="equipment-list">${technical.recording_chain}</div>`;
            }
            return html || '<p>No technical details available</p>';
        }

        function renderCreditsDetails(credits) {
            if (!credits) return '<p>No credits available</p>';
            let html = '<dl class="metadata-grid">';
            if (credits.engineering_production) html += `<dt>engineering & production</dt><dd>${credits.engineering_production}</dd>`;
            if (credits.mixed_mastered) html += `<dt>mixed & mastered by</dt><dd>${credits.mixed_mastered}</dd>`;
            return html + '</dl>';
        }

        function showDetailsContent(type, button) {
            const contentArea = document.getElementById('details-content');
            button.parentElement.querySelectorAll('.nav-button').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            
            if (!currentSong?.details) return;
            const renderers = {
                track: () => renderTrackDetails(currentSong.details.track),
                equipment: () => renderEquipmentDetails(currentSong.details.equipment),
                technical: () => renderTechnicalDetails(currentSong.details.technical),
                credits: () => renderCreditsDetails(currentSong.details.credits)
            };
            contentArea.innerHTML = renderers[type]?.() || '';
        }

        function toggleSection(id) {
            const content = document.getElementById(id);
            const toggle = document.getElementById(id + '-toggle');
            content.classList.toggle('open');
            toggle.textContent = content.classList.contains('open') ? '[ - ]' : '[ + ]';
        }

        // Initialize
        loadSong();
    </script>
</body>
</html>
