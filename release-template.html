<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="a release by rad.typo">
    <title id="page-title">loading... - rad.typo</title>
    <meta property="og:title" content="rad.typo">
    <meta property="og:description" content="a release by rad.typo">
    <meta property="og:image" content="">
    <meta property="og:url" content="">
    <meta property="og:type" content="music.album">
    <meta property="og:site_name" content="rad.typo">
    <link rel="canonical" href="">
    <style>
        :root {
            --bg-color: #fff;
            --text-color: #000;
            --link-color: #0000FF;
            --secondary-color: #666;
            --interactive-color: #333;
            --code-bg: #f5f5f5;
        }

        body {
            font-family: monospace;
            max-width: 800px;
            margin: 48px auto;
            padding: 24px;
            line-height: 1.6;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        h1, h2 { margin: 0; padding: 0; }
        h1 { font-size: 24px; margin-bottom: 24px; }
        h2 { font-size: 16px; }

        a { color: var(--link-color); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .header { margin-bottom: 30px; position: relative; }
        .back { position: absolute; top: 0; right: 0; font-size: 14px; }
        .site-title { color: inherit; text-decoration: none; }
        .site-title:hover { text-decoration: none; }

        .status { color: var(--secondary-color); font-size: 14px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

        .breathing-dots::after {
            content: '';
            animation: breathe 4s infinite;
        }
        @keyframes breathe {
            0%, 100% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }

        .kp-circle {
            width: 12px; height: 12px; border-radius: 50%;
            background: var(--kp-color, #2ecc71);
            transition: background 0.5s ease;
            display: inline-block;
        }

        .album-info { margin-bottom: 40px; }

        .album-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .album-meta {
            color: var(--secondary-color);
            font-size: 14px;
        }

        .binary-indicator {
            font-family: monospace;
            font-size: 16px;
            letter-spacing: 2px;
        }

        /* Carousel (vinyl) */
        .carousel-container { margin: 30px 0; }

        .carousel {
            position: relative;
            width: 100%;
            height: 400px;
            overflow: hidden;
        }

        .carousel-slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .carousel-slide.active { opacity: 1; }

        .carousel-slide img,
        .lathe-video video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .carousel-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .carousel-btn {
            background: none;
            border: 1px solid var(--secondary-color);
            color: var(--secondary-color);
            font-family: monospace;
            font-size: 14px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .carousel-btn:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }

        .carousel-indicators {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .indicator {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--secondary-color);
            cursor: pointer;
            transition: background 0.2s ease;
            border: none;
            padding: 0;
        }

        .indicator.active { background: var(--text-color); }

        /* Tracklist (vinyl) */
        .tracklist { margin: 40px 0; }

        .tracklist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .track-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .track {
            display: flex;
            padding: 8px 0;
            border-bottom: 1px solid var(--code-bg);
            align-items: center;
        }

        .track:hover {
            background-color: var(--code-bg);
            margin: 0 -10px;
            padding: 8px 10px;
        }

        .track-number {
            color: var(--secondary-color);
            min-width: 30px;
            flex-shrink: 0;
        }

        .track-title { flex-grow: 1; }

        .download-symbol {
            color: var(--interactive-color);
            font-size: 16px;
            transition: color 0.2s ease;
            padding: 4px;
            margin-left: auto;
            text-decoration: none;
        }

        .download-symbol:hover {
            color: var(--text-color);
        }

        .download-all-btn {
            display: inline-block;
            font-family: monospace;
            font-size: 14px;
            padding: 8px 16px;
            border: 1px solid var(--secondary-color);
            background: var(--bg-color);
            color: var(--text-color);
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .download-all-btn:hover {
            background: var(--text-color);
            color: var(--bg-color);
            text-decoration: none;
        }

        /* Painting artwork */
        .release-artwork { margin: 30px 0; }

        .release-artwork img {
            width: 100%;
            height: auto;
        }

        .pdf-download {
            margin-top: 10px;
            font-size: 14px;
        }

        /* Painting description */
        .description-block { margin: 40px 0; }

        .description-title {
            font-size: 16px;
            font-weight: bold;
            margin: 0 0 4px 0;
        }

        .description-subtitle {
            color: var(--secondary-color);
            font-size: 14px;
            margin: 0 0 20px 0;
        }

        .description-text {
            margin: 0 0 20px 0;
            font-size: 14px;
        }

        .description-separator {
            color: var(--secondary-color);
            margin: 0 0 20px 0;
        }

        /* Specs table */
        .specs-table {
            font-size: 14px;
            width: 100%;
            border-collapse: collapse;
        }

        .specs-table td {
            padding: 6px 0;
            vertical-align: top;
        }

        .specs-table td:first-child {
            color: var(--secondary-color);
            white-space: nowrap;
            padding-right: 20px;
            width: 110px;
        }

        /* Purchase section */
        .purchase-section {
            margin: 40px 0;
            padding: 20px 0;
            border-top: 1px solid var(--code-bg);
            border-bottom: 1px solid var(--code-bg);
        }

        .price {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .shipping-selector h3 {
            font-size: 16px;
            margin: 0 0 15px 0;
        }

        .shipping-options { margin-bottom: 20px; }

        .shipping-option {
            display: flex;
            align-items: center;
            padding: 8px 0;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .shipping-option:hover {
            background-color: var(--code-bg);
            margin: 0 -10px;
            padding: 8px 10px;
        }

        .shipping-option input[type="radio"] { margin-right: 12px; }

        .shipping-details {
            display: flex;
            justify-content: space-between;
            width: 100%;
            align-items: center;
        }

        .zone { flex-grow: 1; }
        .cost { color: var(--secondary-color); }

        .total-price {
            font-size: 16px;
            padding: 12px 0;
            border-top: 1px solid var(--code-bg);
            margin-top: 10px;
        }

        .buy-now-button {
            font-family: monospace;
            font-size: 14px;
            padding: 12px 24px;
            border: 1px solid var(--secondary-color);
            background: var(--bg-color);
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 15px;
        }

        .buy-now-button:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }

        .buy-now-button.disabled {
            opacity: 0.4;
            cursor: default;
        }

        .buy-now-button.disabled:hover {
            background: var(--bg-color);
            color: var(--text-color);
        }

        .footer {
            margin-top: 60px; padding-top: 20px;
            border-top: 1px solid var(--secondary-color);
            font-size: 14px; color: var(--secondary-color);
        }
        .footer a { color: var(--secondary-color); }

        .error-message { text-align: center; padding: 60px 20px; color: var(--secondary-color); }

        @media (max-width: 600px) {
            body {
                margin: 20px auto;
                padding: 15px;
            }

            .carousel-nav { gap: 10px; }

            .carousel-btn {
                padding: 6px 12px;
                font-size: 12px;
            }

            .tracklist-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="/" class="back">← back</a>
        <h1><a href="/" class="site-title">rad.typo</a></h1>
        <div class="status">
            derry: <span id="weather-temp">-</span>°C <span id="weather-icon">⛅</span> |
            kp: <span class="kp-circle"></span><span id="kp-value">-</span> |
            cpu: <span id="cpu-temp">-</span>°C<span class="breathing-dots"></span>
        </div>
    </header>

    <div id="release-content"></div>

    <footer class="footer">
        └─ <a href="/infrastructure.html">infrastructure</a> | <a href="/telemetry.html">telemetry</a>
    </footer>

    <script src="/js/status.js"></script>
    <script>
        let currentRelease = null;
        let releaseId = null;
        let currentSlide = 0;

        function getReleaseId() {
            let id = new URLSearchParams(window.location.search).get('id');
            if (!id) {
                const match = window.location.pathname.match(/\/releases\/([^/]+)\.html$/);
                if (match) id = match[1];
            }
            return id;
        }

        releaseId = getReleaseId();

        async function loadRelease() {
            if (!releaseId) { showError('No release specified'); return; }
            try {
                const response = await fetch('/data/releases.json');
                const releases = await response.json();
                currentRelease = releases[releaseId];
                if (!currentRelease) { showError(`Release "${releaseId}" not found`); return; }
                renderRelease(currentRelease);
            } catch (error) {
                console.error('Failed to load release:', error);
                showError('Failed to load release data');
            }
        }

        function showError(message) {
            document.getElementById('release-content').innerHTML = `
                <div class="error-message">
                    <p>${message}</p>
                    <p><a href="/">← back to home</a></p>
                </div>`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        const specsLabels = {
            medium: 'medium',
            paperSize: 'paper size',
            imageArea: 'image area',
            condition: 'condition',
            ships: 'ships'
        };

        function getShipsCopy(release) {
            return release.ships || (release.specs && release.specs.ships) || '';
        }

        function hasStripeLinks(release) {
            if (!release.stripeLinks) return false;
            return Object.values(release.stripeLinks).some(v => v != null);
        }

        function renderRelease(release) {
            // Update page metadata
            document.getElementById('page-title').textContent = `${release.title} - rad.typo`;
            document.querySelector('meta[property="og:title"]').setAttribute('content', `${release.title} - rad.typo`);
            document.querySelector('meta[property="og:description"]').setAttribute('content', `${release.title} — a release by rad.typo`);
            document.querySelector('meta[name="description"]').setAttribute('content', `${release.title} — a release by rad.typo`);
            document.querySelector('link[rel="canonical"]').setAttribute('href', `https://radtypo.com/releases/${releaseId}.html`);
            document.querySelector('meta[property="og:url"]').setAttribute('content', `https://radtypo.com/releases/${releaseId}.html`);

            // Set OG image
            if (release.releaseArtwork) {
                document.querySelector('meta[property="og:image"]').setAttribute('content', `https://radtypo.com${release.releaseArtwork}`);
            } else {
                const firstImage = release.carousel.find(s => s.type === 'image');
                if (firstImage) {
                    document.querySelector('meta[property="og:image"]').setAttribute('content', `https://radtypo.com${firstImage.src}`);
                }
            }

            if (release.type === 'painting') {
                renderPainting(release);
            } else {
                renderVinyl(release);
            }

            // Bind shipping change events
            document.querySelectorAll('input[name="shipping"]').forEach(input => {
                input.addEventListener('change', updateTotal);
            });
        }

        function renderVinyl(release) {
            // Build meta line
            const metaParts = [];
            if (release.format) {
                if (release.format.size) metaParts.push(release.format.size);
                if (release.format.type) metaParts.push(release.format.type);
                if (release.format.content) metaParts.push(release.format.content);
            }
            if (release.stock?.total != null && release.stock?.remaining != null) {
                if (release.stock.remaining === 0) {
                    metaParts.push('sold out');
                } else {
                    metaParts.push(`${release.stock.remaining} of ${release.stock.total} remaining`);
                }
            }
            const metaLine = metaParts.join(' • ');

            // Build carousel
            let carouselHtml = '';
            if (release.carousel.length > 0) {
                const slidesHtml = release.carousel.map((slide, i) => {
                    if (slide.type === 'image') {
                        const lazy = i > 0 ? ' loading="lazy"' : '';
                        return `<div class="carousel-slide${i === 0 ? ' active' : ''}" role="tabpanel" aria-label="Slide ${i + 1}">
                            <img src="${slide.src}" alt="${escapeHtml(slide.alt)}"${lazy}>
                        </div>`;
                    } else if (slide.type === 'video') {
                        return `<div class="carousel-slide${i === 0 ? ' active' : ''}" role="tabpanel" aria-label="Slide ${i + 1}">
                            <div class="lathe-video">
                                <video id="release-video" controls preload="none" poster="${slide.poster}">
                                    <source src="${slide.balanced}" type="video/mp4">
                                    ${escapeHtml(slide.alt)}
                                </video>
                            </div>
                        </div>`;
                    }
                    return '';
                }).join('');

                const indicatorsHtml = release.carousel.map((_, i) =>
                    `<button class="indicator${i === 0 ? ' active' : ''}" aria-label="Go to slide ${i + 1}" onclick="goToSlide(${i})"></button>`
                ).join('');

                carouselHtml = `
                    <div class="carousel-container">
                        <div class="carousel" id="carousel" role="tablist" aria-label="Album images">
                            ${slidesHtml}
                        </div>
                        <div class="carousel-nav">
                            <button class="carousel-btn" aria-label="Previous slide" onclick="changeSlide(-1)">← prev</button>
                            <button class="carousel-btn" aria-label="Next slide" onclick="changeSlide(1)">next →</button>
                        </div>
                        <div class="carousel-indicators">
                            ${indicatorsHtml}
                        </div>
                    </div>`;
            }

            // Build tracklist
            let tracklistHtml = '';
            if (release.tracks.length > 0) {
                const tracksHtml = release.tracks.map(t =>
                    `<li class="track">
                        <span class="track-number">${t.number}.</span>
                        <span class="track-title"><a href="/songs/${t.slug}.html">${escapeHtml(t.title)}</a></span>
                        <a href="/audio/${t.slug}.mp3" download class="download-symbol" aria-label="Download ${escapeHtml(t.title)}">⬇</a>
                    </li>`
                ).join('');

                const downloadAllHtml = release.download
                    ? `<a href="${release.download.path}" download class="download-all-btn">download all • ${release.download.size}</a>`
                    : '';

                tracklistHtml = `
                    <section class="tracklist">
                        <div class="tracklist-header">
                            <h2>tracks</h2>
                            ${downloadAllHtml}
                        </div>
                        <ol class="track-list">
                            ${tracksHtml}
                        </ol>
                    </section>`;
            }

            document.getElementById('release-content').innerHTML = `
                <div class="album-info">
                    <div class="album-header">
                        <span class="binary-indicator">${release.binary}</span>
                        <h2>${escapeHtml(release.title)}</h2>
                    </div>
                    <div class="album-meta">${metaLine}</div>
                </div>
                ${carouselHtml}
                ${tracklistHtml}
                ${buildPurchaseHtml(release)}`;

            setupVideoSource();
            setupCarouselKeyboard();
        }

        function renderPainting(release) {
            // Artwork image
            let artworkHtml = '';
            if (release.releaseArtwork) {
                artworkHtml = `
                    <div class="release-artwork">
                        <img src="${release.releaseArtwork}" alt="${escapeHtml(release.title)}">
                        ${release.pdfDownload ? `<div class="pdf-download"><a href="${release.pdfDownload}" target="_blank">download hi-res scan (pdf)</a></div>` : ''}
                    </div>`;
            }

            // Description block
            let descriptionHtml = '';
            const medium = release.specs?.medium || '';
            const year = release.date || '';
            const subtitle = [medium, year].filter(Boolean).join(' — ');

            descriptionHtml = `
                <div class="description-block">
                    <p class="description-title">${escapeHtml(release.title)}</p>
                    ${subtitle ? `<p class="description-subtitle">${escapeHtml(subtitle)}</p>` : ''}
                    ${release.description ? `<p class="description-text">${escapeHtml(release.description)}</p>` : ''}
                    <p class="description-separator">————</p>
                    ${buildSpecsTable(release)}
                </div>`;

            document.getElementById('release-content').innerHTML = `
                <div class="album-info">
                    <div class="album-header">
                        <span class="binary-indicator">${release.binary}</span>
                        <h2>${escapeHtml(release.title)}</h2>
                    </div>
                </div>
                ${artworkHtml}
                ${descriptionHtml}
                ${buildPurchaseHtml(release)}`;
        }

        function buildSpecsTable(release) {
            if (!release.specs) return '';
            const rows = Object.entries(release.specs).map(([key, value]) => {
                const label = specsLabels[key] || key;
                return `<tr><td>${escapeHtml(label)}</td><td>${escapeHtml(value)}</td></tr>`;
            }).join('');
            return `<table class="specs-table">${rows}</table>`;
        }

        function buildPurchaseHtml(release) {
            if (release.price == null) return '';

            const shippingKeys = Object.keys(release.shipping);
            const firstKey = shippingKeys[0];
            const firstCost = release.shipping[firstKey].cost;
            const canBuy = hasStripeLinks(release);
            const ships = getShipsCopy(release);

            const shippingOptionsHtml = shippingKeys.map((key, i) => {
                const zone = release.shipping[key];
                return `<label class="shipping-option">
                    <input type="radio" name="shipping" value="${key}"${i === 0 ? ' checked' : ''}>
                    <span class="shipping-details">
                        <span class="zone">${escapeHtml(zone.label)}</span>
                        <span class="cost">${zone.cost != null ? '£' + zone.cost : 'tbc'}</span>
                    </span>
                </label>`;
            }).join('');

            const buttonText = canBuy
                ? `buy now${ships ? ' • ships ' + ships : ''}`
                : 'available soon';
            const buttonClass = canBuy ? 'buy-now-button' : 'buy-now-button disabled';
            const buttonOnclick = canBuy ? ' onclick="proceedToCheckout()"' : '';

            return `
                <section class="purchase-section">
                    <div class="price">£${release.price}</div>
                    <div class="shipping-selector">
                        <h3>shipping</h3>
                        <div class="shipping-options">
                            ${shippingOptionsHtml}
                        </div>
                        <div class="total-price">
                            total: ${firstCost != null ? '£<span id="total">' + (release.price + firstCost) + '</span>' : '<span id="total">tbc</span>'}
                        </div>
                    </div>
                    <button class="${buttonClass}"${buttonOnclick}>
                        ${buttonText}
                    </button>
                </section>`;
        }

        // Audit fix (b): use matchMedia to swap video src for mobile
        function setupVideoSource() {
            const video = document.getElementById('release-video');
            if (!video) return;
            const videoSlide = currentRelease.carousel.find(s => s.type === 'video');
            if (!videoSlide) return;
            const isMobile = window.matchMedia('(max-width: 600px)').matches;
            video.querySelector('source').src = isMobile ? videoSlide.small : videoSlide.balanced;
        }

        // Carousel
        function changeSlide(direction) {
            const total = currentRelease.carousel.length;
            if (total === 0) return;
            currentSlide = (currentSlide + direction + total) % total;
            updateCarousel();
        }

        function goToSlide(slideIndex) {
            currentSlide = slideIndex;
            updateCarousel();
        }

        function updateCarousel() {
            document.querySelectorAll('.carousel-slide').forEach((slide, index) => {
                slide.classList.toggle('active', index === currentSlide);
                const video = slide.querySelector('video');
                if (video && !slide.classList.contains('active')) video.pause();
            });
            document.querySelectorAll('.indicator').forEach((indicator, index) => {
                indicator.classList.toggle('active', index === currentSlide);
            });
        }

        // Audit fix (e): keyboard navigation for carousel
        function setupCarouselKeyboard() {
            const carousel = document.getElementById('carousel');
            if (!carousel) return;
            document.addEventListener('keydown', function(e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                if (e.key === 'ArrowLeft') { changeSlide(-1); e.preventDefault(); }
                if (e.key === 'ArrowRight') { changeSlide(1); e.preventDefault(); }
            });
        }

        // Purchase
        function updateTotal() {
            const selectedKey = document.querySelector('input[name="shipping"]:checked').value;
            const cost = currentRelease.shipping[selectedKey].cost;
            document.getElementById('total').textContent = cost != null ? currentRelease.price + cost : 'tbc';
        }

        function proceedToCheckout() {
            const selectedKey = document.querySelector('input[name="shipping"]:checked').value;
            const link = currentRelease.stripeLinks[selectedKey];
            if (link) window.open(link, '_blank');
        }

        // Initialize
        loadRelease();
    </script>
</body>
</html>
