<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="stream all rad.typo releases">
    <title>radio - rad.typo</title>
    <style>
        :root {
            --bg-color: #fff;
            --text-color: #000;
            --link-color: #0000FF;
            --secondary-color: #666;
            --interactive-color: #333;
            --code-bg: #f5f5f5;
        }

        body {
            font-family: monospace;
            max-width: 800px;
            margin: 48px auto;
            padding: 24px;
            line-height: 1.6;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        h1 {
            font-size: 24px;
            margin: 0 0 24px 0;
        }

        h2 {
            font-size: 16px;
            margin: 0 0 15px 0;
        }

        a {
            color: var(--link-color);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .header {
            margin-bottom: 30px;
        }

        .status {
            color: var(--secondary-color);
            font-size: 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .breathing-dots::after {
            content: '';
            animation: breathe 4s infinite;
        }

        @keyframes breathe {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
            100% { content: ''; }
        }

        .kp-circle {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--kp-color, #2ecc71);
            transition: background 0.5s ease;
            display: inline-block;
        }

        .filter-link {
            cursor: pointer;
            color: var(--secondary-color);
            text-decoration: none;
        }

        .filter-link:hover {
            text-decoration: underline;
        }

        .filter-link.active {
            color: var(--text-color);
            font-weight: bold;
        }

        /* Player */
        .player {
            margin: 20px 0;
            border: 1px solid var(--secondary-color);
            border-radius: 4px;
            padding: 15px;
        }

        #track-title {
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            margin: 0 0 15px 0;
        }

        #player-audio {
            width: 100%;
            margin-bottom: 10px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .ctrl {
            background: none;
            border: none;
            font-family: monospace;
            font-size: 14px;
            padding: 0;
            cursor: pointer;
            color: var(--secondary-color);
        }

        .ctrl:hover {
            color: var(--text-color);
            text-decoration: underline;
        }

        /* Tracklist */
        .tracklist {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .tracklist li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--code-bg);
            cursor: pointer;
            font-size: 14px;
        }

        .tracklist li:hover {
            background-color: var(--code-bg);
            margin: 0 -10px;
            padding: 12px 10px;
        }

        .track-name {
            flex-grow: 1;
        }

        .track-duration {
            color: var(--secondary-color);
            flex-shrink: 0;
            margin-left: 15px;
        }

        .footer {
            margin-top: 30px;
            padding-top: 15px;
            border-top: 1px solid var(--secondary-color);
            font-size: 14px;
            color: var(--secondary-color);
        }

        .footer a {
            color: var(--secondary-color);
        }

        @media (max-width: 600px) {
            body {
                margin: 20px auto;
                padding: 15px;
            }

            .ctrl {
                min-height: 44px;
                display: inline-flex;
                align-items: center;
            }

            .tracklist li {
                padding: 8px 0;
            }

            .tracklist li:hover {
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>rad.typo</h1>
        <div class="status">
            derry: <span id="weather-temp">-</span>°C <span id="weather-icon">⛅</span> |
            kp: <span class="kp-circle"></span><span id="kp-value">-</span> |
            cpu: <span id="cpu-temp">-</span>°C<span class="breathing-dots"></span>
        </div>
    </header>

    <h2><a href="/index.html" class="filter-link">all</a> | <a href="/index.html#songs" class="filter-link">songs</a> | <a href="/index.html#poems" class="filter-link">poems</a> | <a href="/index.html#releases" class="filter-link">releases</a> | <span class="filter-link active">rad.io</span></h2>

    <div class="player">
        <div id="track-title">—</div>
        <audio id="player-audio" controls preload="metadata"></audio>
        <div class="controls">
            <button class="ctrl" id="btn-prev">prev</button>
            <button class="ctrl" id="btn-next">next</button>
            <button class="ctrl" id="btn-shuffle">shuffle</button>
            <button class="ctrl" id="btn-loop">loop</button>
        </div>
    </div>

    <ul class="tracklist" id="tracklist"></ul>

    <footer class="footer">
└─ <a href="/infrastructure.html">infrastructure</a> | <a href="/telemetry.html">telemetry</a>
    </footer>

    <script src="/js/status.js"></script>
    <script>
        let songs = [];
        let currentIdx = -1;
        let loopActive = false;

        const audio = document.getElementById('player-audio');
        const trackTitle = document.getElementById('track-title');
        const tracklist = document.getElementById('tracklist');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const btnShuffle = document.getElementById('btn-shuffle');
        const btnLoop = document.getElementById('btn-loop');

        function fmtDuration(sec) {
            if (!isFinite(sec) || isNaN(sec) || sec < 0) return '';
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function updateMediaSession(song) {
            if (!('mediaSession' in navigator)) return;
            const src = `/images/${song.artwork}`;
            const type = song.artwork.endsWith('.png') ? 'image/png' : 'image/jpeg';
            navigator.mediaSession.metadata = new MediaMetadata({
                title: song.title,
                artist: 'rad.typo',
                album: 'radio',
                artwork: [
                    { src, sizes: '96x96', type },
                    { src, sizes: '128x128', type },
                    { src, sizes: '512x512', type },
                ],
            });
        }

        function updateTracklistHighlight() {
            tracklist.querySelectorAll('li').forEach((li, idx) => {
                const nameSpan = li.querySelector('.track-name');
                const title = songs[idx].title;
                nameSpan.textContent = idx === currentIdx ? `► ${title}` : title;
            });
        }

        function loadAndPlay(idx) {
            currentIdx = idx;
            const song = songs[idx];
            trackTitle.textContent = song.title;
            audio.src = `/audio/${song.key}.mp3`;
            audio.load();
            audio.play().catch(() => {});
            updateTracklistHighlight();
            updateMediaSession(song);
        }

        function playNext() {
            if (songs.length === 0) return;
            const nextIdx = (currentIdx + 1) % songs.length;
            loadAndPlay(nextIdx);
        }

        function playPrev() {
            if (songs.length === 0) return;
            if (audio.currentTime > 3) {
                audio.currentTime = 0;
                return;
            }
            const prevIdx = (currentIdx - 1 + songs.length) % songs.length;
            loadAndPlay(prevIdx);
        }

        function playShuffle() {
            if (songs.length <= 1) return;
            let idx;
            do {
                idx = Math.floor(Math.random() * songs.length);
            } while (idx === currentIdx);
            loadAndPlay(idx);
        }

        audio.addEventListener('ended', () => {
            if (loopActive) {
                audio.currentTime = 0;
                audio.play().catch(() => {});
            } else {
                playNext();
            }
        });

        btnPrev.addEventListener('click', playPrev);
        btnNext.addEventListener('click', playNext);
        btnShuffle.addEventListener('click', playShuffle);
        btnLoop.addEventListener('click', () => {
            loopActive = !loopActive;
            btnLoop.textContent = loopActive ? '[loop]' : 'loop';
        });

        if ('mediaSession' in navigator) {
            navigator.mediaSession.setActionHandler('play', () => audio.play());
            navigator.mediaSession.setActionHandler('pause', () => audio.pause());
            navigator.mediaSession.setActionHandler('nexttrack', playNext);
            navigator.mediaSession.setActionHandler('previoustrack', playPrev);
        }

        // Load songs and build tracklist
        fetch('/data/songs.json')
            .then(r => r.json())
            .then(data => {
                const today = new Date().toISOString().slice(0, 10);
                const hidden = ['old-enough-to-handle-it', 'the-most-generic-experience-ever'];
                songs = Object.entries(data)
                    .filter(([key, song]) => {
                        if (hidden.includes(key)) return false;
                        if (!song.audio) return false;
                        if (!song.date || song.date.length < 10 || song.date > today) return false;
                        return true;
                    })
                    .map(([key, song]) => ({
                        key,
                        title: song.title,
                        artwork: song.artwork,
                        date: song.date,
                    }));

                // Sort by date descending (newest first)
                songs.sort((a, b) => b.date.localeCompare(a.date));

                songs.forEach((song, idx) => {
                    const li = document.createElement('li');
                    li.innerHTML = `<span class="track-name">${song.title}</span><span class="track-duration"></span>`;
                    li.addEventListener('click', () => loadAndPlay(idx));
                    tracklist.appendChild(li);
                });

                // Pick a random track and autoplay
                const startIdx = Math.floor(Math.random() * songs.length);
                loadAndPlay(startIdx);
            });
    </script>
</body>
</html>
