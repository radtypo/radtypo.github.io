<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rad.typo</title>
    <style>
        :root {
            --bg-color: #fff;
            --text-color: #000;
            --secondary-color: #666;
            --link-color: #0000FF;
        }

        body {
            font-family: monospace;
            max-width: 800px;
            margin: 48px auto;
            padding: 24px;
            line-height: 1.6;
            background: var(--bg-color);
            color: var(--text-color);
        }

        h1 { font-size: 24px; margin: 0 0 24px; padding: 0; }

        a { color: var(--link-color); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .header { margin-bottom: 30px; position: relative; }
        .back { position: absolute; top: 0; right: 0; font-size: 14px; }
        .site-title { color: inherit; text-decoration: none; }
        .site-title:hover { text-decoration: none; }

        .status {
            color: var(--secondary-color);
            font-size: 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .breathing-dots::after {
            content: '';
            animation: breathe 4s infinite;
        }
        @keyframes breathe {
            0%, 100% { content: ''; }
            25%  { content: '.'; }
            50%  { content: '..'; }
            75%  { content: '...'; }
        }

        .kp-circle {
            width: 12px; height: 12px; border-radius: 50%;
            background: var(--kp-color, #2ecc71);
            transition: background 0.5s;
            display: inline-block;
        }

        /* oracle */
        #oracle {
            margin: 60px 0 80px;
        }

        #input-wrap {
            position: relative;
        }

        #q {
            font-family: monospace;
            font-size: 16px;
            line-height: 1.6;
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--text-color);
            outline: none;
            resize: none;
            padding: 0 20px 4px 0;
            box-sizing: border-box;
            overflow: hidden;
            min-height: 28px;
            display: block;
        }

        #q:disabled {
            opacity: 0.35;
            cursor: default;
        }

        #attach-btn {
            position: absolute;
            bottom: 7px;
            right: 0;
            font-size: 14px;
            color: var(--secondary-color);
            cursor: pointer;
            line-height: 1;
            user-select: none;
            font-family: monospace;
        }
        #attach-btn:hover { color: var(--text-color); }

        #img-preview {
            margin-top: 6px;
            font-size: 12px;
            color: var(--secondary-color);
            cursor: pointer;
            user-select: none;
        }
        #img-preview:hover { text-decoration: line-through; }

        #a {
            display: none;
            font-family: monospace;
            font-size: 16px;
            line-height: 1.8;
            white-space: pre-line;
            cursor: text;
        }

        .footer {
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px solid var(--secondary-color);
            font-size: 14px;
            color: var(--secondary-color);
        }
        .footer a { color: var(--secondary-color); }

        @media (max-width: 600px) {
            body { margin: 20px auto; padding: 15px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="/" class="back">← back</a>
        <h1><a href="/" class="site-title">rad.typo</a></h1>
        <div class="status">
            derry: <span id="weather-temp">-</span>°C <span id="weather-icon">⛅</span> |
            kp: <span class="kp-circle"></span><span id="kp-value">-</span> |
            cpu: <span id="cpu-temp">-</span>°C<span class="breathing-dots"></span>
        </div>
    </header>

    <div id="oracle">
        <div id="input-wrap">
            <textarea id="q" rows="1" autofocus spellcheck="false" autocomplete="off"></textarea>
            <span id="attach-btn" title="attach image">+</span>
            <input type="file" id="file-input" accept="image/*" style="display:none">
            <div id="img-preview"></div>
        </div>
        <div id="a"></div>
    </div>

    <footer class="footer">
        └─ <a href="/infrastructure.html">infrastructure</a> | <a href="/telemetry.html">telemetry</a>
    </footer>

    <script src="/js/status.js"></script>
    <script>
        // --- Oracle ---

        let mode     = 'input'; // 'input' | 'waiting' | 'response'
        let attached = null;    // { data, type, name }

        const q           = document.getElementById('q');
        const a           = document.getElementById('a');
        const inputWrap   = document.getElementById('input-wrap');
        const imgPreview  = document.getElementById('img-preview');
        const fileInput   = document.getElementById('file-input');
        const attachBtn   = document.getElementById('attach-btn');

        // Auto-resize textarea
        q.addEventListener('input', resize);
        function resize() {
            q.style.height = 'auto';
            q.style.height = q.scrollHeight + 'px';
        }

        // Enter submits; Shift+Enter inserts newline
        q.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                submit();
            }
        });

        // File attachment via button
        attachBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', () => {
            if (fileInput.files[0]) setImage(fileInput.files[0]);
        });

        // Drag-and-drop onto input
        q.addEventListener('dragover', e => e.preventDefault());
        q.addEventListener('drop', e => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) setImage(file);
        });

        // Paste image from clipboard
        document.addEventListener('paste', e => {
            if (mode !== 'input') return;
            const item = Array.from(e.clipboardData.items).find(i => i.type.startsWith('image/'));
            if (item) {
                e.preventDefault();
                setImage(item.getAsFile());
            }
        });

        function setImage(file) {
            const reader = new FileReader();
            reader.onload = ev => {
                const url   = ev.target.result;
                const comma = url.indexOf(',');
                attached = {
                    data: url.slice(comma + 1),
                    type: file.type || 'image/jpeg',
                    name: file.name || 'image',
                };
                imgPreview.textContent = attached.name;
            };
            reader.readAsDataURL(file);
        }

        // Click preview to clear attachment
        imgPreview.addEventListener('click', () => {
            attached = null;
            imgPreview.textContent = '';
            fileInput.value = '';
        });

        async function submit() {
            if (mode !== 'input') return;
            const text = q.value.trim();
            if (!text && !attached) return;

            mode = 'waiting';
            q.disabled = true;

            const body = {};
            if (text)     body.text  = text;
            if (attached) body.image = { data: attached.data, type: attached.type };

            try {
                const res  = await fetch('/g.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const json = await res.json();
                if (json.response) {
                    showResponse(json.response);
                } else {
                    resetInput();
                }
            } catch (_) {
                resetInput();
            }
        }

        function showResponse(text) {
            mode = 'response';
            inputWrap.style.display = 'none';
            a.style.display = 'block';
            a.textContent   = text;
        }

        function resetInput() {
            mode = 'input';
            q.disabled               = false;
            q.value                  = '';
            q.style.height           = 'auto';
            attached                 = null;
            imgPreview.textContent   = '';
            fileInput.value          = '';
            inputWrap.style.display  = 'block';
            a.style.display          = 'none';
            a.textContent            = '';
            q.focus();
        }

        // Click response or any key to return to input
        a.addEventListener('click', resetInput);
        document.addEventListener('keydown', e => {
            if (mode === 'response' && !e.metaKey && !e.ctrlKey && e.key !== 'Tab') {
                resetInput();
            }
        });

    </script>
</body>
</html>
